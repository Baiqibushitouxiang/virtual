server:
  port: 9999

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dam?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 200MB
  thymeleaf:
    enabled: false
  jpa:
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/*.xml

file:
  upload-dir: ${FILE_UPLOAD_DIR:./src/main/resources/static/models}
  upload-dir-absolute: false

opcua:
  server:
    enabled: true
    name: DigitalTwinOPCUAServer
    application-uri: urn:digital-twin:opcua:server
    product-uri: urn:digital-twin:opcua:product
    bind-address: 0.0.0.0
    port: 4840
    security-policies:
      - None
      - Basic128Rsa15
      - Basic256
      - Basic256Sha256
    security-modes:
      - None
      - Sign
      - SignAndEncrypt
    certificate:
      path: opcua/certificates
      generate-if-missing: true
  client:
    enabled: true
    connection-timeout: 5000
    session-timeout: 60000

tencent:
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    region: ${TENCENT_COS_REGION:ap-nanjing}
    bucket-name: ${TENCENT_COS_BUCKET:}
    base-url: ${TENCENT_COS_BASE_URL:}

storage:
  type: ${STORAGE_TYPE:cos}
