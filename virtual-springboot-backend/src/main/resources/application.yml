server:
  port: 9999
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dam?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=GMT%2B8
    # username: root
    # password: 123456
    username: root
    password: hfdjiosghhf*jksi
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 2000MB
      max-request-size: 2000MB
  thymeleaf:
    enabled: false
  jpa:
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/*.xml

file:
  upload-dir: ${FILE_UPLOAD_DIR:./src/main/resources/static/models}
  upload-dir-absolute: false

opcua:
  server:
    enabled: true
    name: DigitalTwinOPCUAServer
    application-uri: urn:digital-twin:opcua:server
    product-uri: urn:digital-twin:opcua:product
    bind-address: 0.0.0.0
    port: 4840
    security-policies:
      - None
      - Basic128Rsa15
      - Basic256
      - Basic256Sha256
    security-modes:
      - None
      - Sign
      - SignAndEncrypt
    certificate:
      path: opcua/certificates
      generate-if-missing: true
  client:
    enabled: true
    connection-timeout: 50000
    session-timeout: 100000
